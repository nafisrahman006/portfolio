<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#050c14"/>

  <!-- Outer gear ring spinning -->
  <g opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="8s" repeatCount="indefinite"/>
    <circle cx="16" cy="16" r="13" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="3 2.5"/>
    <!-- Gear teeth -->
    <rect x="15" y="1.5" width="2" height="3" rx="0.5" fill="#00d4ff"/>
    <rect x="15" y="27.5" width="2" height="3" rx="0.5" fill="#00d4ff"/>
    <rect x="1.5" y="15" width="3" height="2" rx="0.5" fill="#00d4ff"/>
    <rect x="27.5" y="15" width="3" height="2" rx="0.5" fill="#00d4ff"/>
    <rect x="4.5" y="5.8" width="2" height="3" rx="0.5" fill="#00d4ff" transform="rotate(45 5.5 7.3)"/>
    <rect x="25.5" y="5.8" width="2" height="3" rx="0.5" fill="#00d4ff" transform="rotate(-45 26.5 7.3)"/>
    <rect x="4.5" y="23.2" width="2" height="3" rx="0.5" fill="#00d4ff" transform="rotate(-45 5.5 24.7)"/>
    <rect x="25.5" y="23.2" width="2" height="3" rx="0.5" fill="#00d4ff" transform="rotate(45 26.5 24.7)"/>
  </g>

  <!-- Inner gear counter-spinning -->
  <g opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 16 16" to="0 16 16" dur="5s" repeatCount="indefinite"/>
    <circle cx="16" cy="16" r="8" fill="none" stroke="#0099bb" stroke-width="0.8" stroke-dasharray="2 2"/>
    <!-- Inner teeth -->
    <rect x="15.2" y="7" width="1.6" height="2" rx="0.4" fill="#0099bb"/>
    <rect x="15.2" y="23" width="1.6" height="2" rx="0.4" fill="#0099bb"/>
    <rect x="7" y="15.2" width="2" height="1.6" rx="0.4" fill="#0099bb"/>
    <rect x="23" y="15.2" width="2" height="1.6" rx="0.4" fill="#0099bb"/>
  </g>

  <!-- Center: > _ prompt -->
  <text x="8.5" y="19.5" font-family="monospace" font-size="9" font-weight="bold" fill="#00d4ff">
    &gt;_
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
</svg>
